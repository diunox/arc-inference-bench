# Docker Compose for Intel Arc GPU LLM inference
#
# Default service: llama.cpp with SYCL backend
# Benchmark profile: adds OpenVINO OVMS for comparison
#
# Usage:
#   docker compose up -d llm                              # SYCL only (production)
#   docker compose --profile benchmark up -d openvino-llm # add OpenVINO for benchmarking
#
# GPU requirements:
#   - Intel Arc A770 (16GB) or similar discrete GPU
#   - i915 or xe kernel driver loaded
#   - /dev/dri/renderD128 and /dev/dri/card1 accessible
#
# Adjust device paths, GIDs, model paths, and port mappings for your system.

services:
  llm:
    image: ghcr.io/ggml-org/llama.cpp:server-intel
    container_name: llm-server
    command: ["--metrics", "--flash-attn", "1"]
    ports:
      - 8000:8000
    volumes:
      - /media/models/gguf:/models:ro
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card1:/dev/dri/card1
    environment:
      # Intel oneAPI / SYCL settings
      - ONEAPI_DEVICE_SELECTOR=level_zero:0
      - ZES_ENABLE_SYSMAN=1
      - UR_L0_ENABLE_RELAXED_ALLOCATION_LIMITS=1  # use full 16GB VRAM
      - GGML_SYCL_ENABLE_FLASH_ATTN=1

      # llama.cpp server config
      - LLAMA_ARG_MODEL=/models/Qwen3-14B-Q4_0.gguf
      - LLAMA_ARG_ALIAS=qwen3-14b
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8000
      - LLAMA_ARG_CTX_SIZE=16384
      - LLAMA_ARG_N_GPU_LAYERS=999
      - LLAMA_ARG_N_PARALLEL=4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    shm_size: 16g
    restart: unless-stopped

  openvino-llm:
    image: openvino/model_server:latest-gpu
    container_name: openvino-llm
    profiles:
      - benchmark
    ports:
      - 8001:8000
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card1:/dev/dri/card1
    group_add:
      - "44"    # video
      - "991"   # render (check your system: getent group render)
    volumes:
      - ./openvino-models:/models:rw
    command: >
      --source_model OpenVINO/Qwen3-14B-int4-ov
      --model_repository_path /models
      --task text_generation
      --rest_port 8000
      --target_device GPU
      --plugin_config '{"KV_CACHE_PRECISION":"u8","DYNAMIC_QUANTIZATION_GROUP_SIZE":"32"}'
      --cache_size 4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v3/models"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    shm_size: 16g
    restart: unless-stopped
